name: Gold Price Alert

on:
  schedule:
    # Chạy mỗi tiếng đúng giờ (UTC). Bắt đầu từ 00:00 UTC = 07:00 VN.
    - cron: '0 * * * *'
    # Báo cáo 24h: 01:00 UTC = 08:00 VN
    - cron: '0 1 * * *'
  # Cho phép chạy thủ công từ tab Actions
  workflow_dispatch:
    inputs:
      action:
        description: 'Job to run'
        required: true
        default: 'monitor'
        type: choice
        options:
          - monitor
          - daily-report

jobs:
  # ─── Job 1: Monitor giá vàng (mỗi tiếng) ───────────────────────────────────
  monitor:
    name: Monitor Gold Price
    runs-on: ubuntu-latest
    # Chỉ chạy khi: trigger thủ công với action=monitor HOẶC là schedule 0 * * * *
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'monitor') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 * * * *')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Dùng PAT để có quyền push commit state về repo
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Run monitor
        env:
          ACTION: monitor
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: npm start

      - name: Commit updated state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/state.json data/history.json
          # Chỉ commit nếu có thay đổi thực sự
          if ! git diff --cached --quiet; then
            git commit -m "chore(data): update state [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi

  # ─── Job 2: Báo cáo 24h (mỗi ngày 8h VN) ──────────────────────────────────
  daily-report:
    name: Daily Report
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'daily-report') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 1 * * *')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Run daily report
        env:
          ACTION: daily-report
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: npm start
